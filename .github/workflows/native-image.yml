name: Native Image (Raspberry Pi)

on:
  push:
    tags: ['v*']

jobs:
  native-image:
    name: Build Native Image for Raspberry Pi (ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up GraalVM JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: graalvm
          cache: maven

      - name: Build and install JVM artifacts
        run: mvn clean install -DskipTests --batch-mode --no-transfer-progress

      - name: Build native image for Raspberry Pi (ARM64)
        run: >
          mvn -pl phoniebox-app package -Pnative -DskipTests
          --batch-mode --no-transfer-progress
          -Dquarkus.native.container-build=true
          -Dquarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-21
          -Dquarkus.native.container-runtime-options="--platform=linux/arm64"

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: phoniebox-native-arm64
          path: phoniebox-app/target/*-runner
          if-no-files-found: error
