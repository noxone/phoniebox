# ── Quarkus indexing ──────────────────────────────────────────────────────────
# Library modules (not the app module itself) are not scanned by Quarkus by
# default.  Each feature module that contains JPA entities must be listed here
# so that Hibernate can discover @Entity / @Embeddable / @Converter classes.
quarkus.index-dependency.phoniebox-shared.group-id=eu.noxone.phoniebox
quarkus.index-dependency.phoniebox-shared.artifact-id=phoniebox-shared
quarkus.index-dependency.phoniebox-media.group-id=eu.noxone.phoniebox
quarkus.index-dependency.phoniebox-media.artifact-id=phoniebox-media

# ── Datasource ────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:${phoniebox.database.path:./phoniebox.db}

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
# Schema is managed by Flyway; Hibernate must not touch it.
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ── Media storage ─────────────────────────────────────────────────────────────
phoniebox.media.storage-path=./media-storage

# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8080

# Allow the Vite dev server (port 5173) to reach the API during development.
# In production the SPA is served from the same origin; CORS is not needed.
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:5173
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=Content-Type,Authorization

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
%dev.quarkus.log.level=DEBUG
%dev.quarkus.hibernate-orm.log.sql=true
