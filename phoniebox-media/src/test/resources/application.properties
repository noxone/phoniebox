# In-memory H2 datasource for unit tests — keeps Hibernate ORM happy without a real DB.
# Flyway is not on this module's classpath, so no migration config is needed.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

# Required by FileStorageAdapter — irrelevant since the service is mocked in REST tests.
phoniebox.media.storage-path=/tmp/phoniebox-test-media
